name: Refresh profile metrics

on:
  schedule:
    - cron: "23 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG metrics
        run: node scripts/update-metrics.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USER: wzacolemak

      - name: Commit refreshed metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md metrics.left.svg metrics.right.svg
          if git diff --cached --quiet; then
            echo "Metrics are already up to date."
            exit 0
          fi
          git commit -m "chore: refresh profile metrics"
          git push
